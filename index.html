<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>雙北捷運足跡冒險</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#e30022">
    <link rel="apple-touch-icon" href="https://via.placeholder.com/192/e30022/FFFFFF?text=Metro">
    <style>
        body { overflow: hidden; height: 100vh; }
        /* 臨時補上進度條與選單的樣式 */
        #top-bar {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            width: 90%;
            max-width: 400px;
            background: white;
            padding: 15px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            z-index: 1000;
            text-align: center;
        }
        .progress-container {
            width: 100%;
            background: #eee;
            border-radius: 10px;
            height: 10px;
            margin-top: 10px;
            overflow: hidden;
        }
        #progress-fill {
            height: 100%;
            background: #005edd;
            width: 0%;
            transition: width 0.5s ease;
        }
        .nav-buttons {
            display: flex;
            justify-content: space-around;
            margin-top: 15px;
        }
        .nav-btn {
            padding: 5px 15px;
            border: none;
            border-radius: 20px;
            background: #f0f0f0;
            cursor: pointer;
            font-weight: bold;
        }
        /* 🔧 修正 Leaflet 標籤重疊與阻擋點擊的問題 */
        .station-label {
            background-color: rgba(255, 255, 255, 0.85) !important;
            border: 1px solid rgba(0,0,0,0.1) !important;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1) !important;
            font-weight: bold;
            color: #333;
            font-size: 0.8rem;
            pointer-events: none !important;
        }
        /* 座標工具 */
        #coord-display {
            position: absolute;
            bottom: 10px;
            right: 10px;
            background: rgba(0,0,0,0.65);
            color: #fff;
            font-size: 0.78rem;
            padding: 5px 10px;
            border-radius: 8px;
            z-index: 1000;
            pointer-events: none;
            font-family: monospace;
            display: none;
        }
        #coord-copied {
            position: absolute;
            bottom: 40px;
            right: 10px;
            background: #005edd;
            color: #fff;
            font-size: 0.78rem;
            padding: 5px 12px;
            border-radius: 8px;
            z-index: 1000;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.3s;
        }
        /* 搜尋框 */
        #search-box {
            margin-top: 10px;
            position: relative;
        }
        #search-input {
            width: 100%;
            padding: 8px 14px;
            border: 1px solid #ddd;
            border-radius: 20px;
            font-size: 0.9rem;
            box-sizing: border-box;
            outline: none;
        }
        #search-input:focus { border-color: #005edd; }
        #search-results {
            position: absolute;
            top: calc(100% + 4px);
            left: 0; right: 0;
            background: white;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.15);
            max-height: 200px;
            overflow-y: auto;
            z-index: 2000;
            display: none;
            text-align: left;
        }
        .search-result-item {
            padding: 10px 14px;
            cursor: pointer;
            font-size: 0.9rem;
            border-bottom: 1px solid #f0f0f0;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .search-result-item:last-child { border-bottom: none; }
        .search-result-item:hover { background: #f5f5f5; }
        /* 路線篩選 */
        #filter-box {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin-top: 8px;
        }
        .filter-btn {
            flex-shrink: 0;
            border: none;
            border-radius: 14px;
            padding: 4px 10px;
            font-size: 0.78rem;
            font-weight: bold;
            cursor: pointer;
            transition: opacity 0.2s, transform 0.1s;
            white-space: nowrap;
            color: white;
        }
        .filter-btn:active { transform: scale(0.95); }
        .filter-btn-all { background: #333; }
        .filter-btn.inactive { opacity: 0.3; }
    </style>
</head>
<body>
    <div id="app-container">
        <div id="top-bar">
            <div id="progress-text">捷運制霸進度: 0 / 0 (0%)</div>
                <div id="progress-bar" class="progress-container">
                    <div id="progress-fill"></div>
                </div>
            <div class="nav-buttons">
                <button class="nav-btn" id="login-status-btn">🔑 登入</button>
                <button class="nav-btn" onclick="location.href='stamps.html'">📖 集章冊</button>
                <button class="nav-btn" onclick="location.href='timeline.html'">⏱️ 時間軸</button>
            </div>
            <div id="search-box">
                <input type="text" id="search-input" placeholder="🔍 搜尋車站..." autocomplete="off">
                <div id="search-results"></div>
            </div>
            <div id="filter-box">
                <button id="filter-all-btn" class="filter-btn filter-btn-all">全部</button>
            </div>
        </div>

        <div id="map"></div>
        <div id="coord-display">📍 lat, lng</div>
        <div id="coord-copied">已複製！</div>

        <div id="station-card" class="card-hidden">
            <button id="close-btn">×</button>
            <h2 id="card-title">車站名稱</h2>
            <div id="card-line" style="margin-bottom: 10px;"></div>

            <div class="card-content">
                <h3>📍 推薦景點</h3>
                <p id="card-spots">景點介紹...</p>
                
                <div class="gallery">
                    <div class="img-box">
                        <h4>📝 紀念章</h4>
                        <img id="stamp-img" src="" alt="紀念章">
                    </div>
                    <div class="img-box">
                        <h4>📸 合照</h4>
                        <img id="photo-img" src="" alt="合照">
                    </div>
                </div>
            </div>
                <div id="checkin-form" class="hidden" style="margin-top: 15px; padding-top: 15px; border-top: 1px solid #eee;">
                    <h3 style="font-size: 1rem; margin-bottom: 10px;">✅ 實地打卡解鎖</h3>
                    <div style="margin-bottom: 8px;">
                        <label style="font-size: 0.8rem; color: #666; display:block;">📝 上傳紀念章</label>
                        <input type="file" id="upload-stamp" accept="image/*" style="font-size: 0.8rem;">
                    </div>
                    <div style="margin-bottom: 12px;">
                        <label style="font-size: 0.8rem; color: #666; display:block;">📸 上傳合照</label>
                        <input type="file" id="upload-photo" accept="image/*" style="font-size: 0.8rem;">
                    </div>
                    <button id="submit-checkin-btn" class="nav-btn" style="width: 100%; background: #005edd; color: white;">送出解鎖</button>
                    <p id="upload-msg" style="font-size: 0.85rem; text-align: center; margin-top: 8px;"></p>
                </div>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="app.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登入 - 雙北捷運足跡冒險</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #e5e3df;
        }
        .login-card {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            width: 90%;
            max-width: 350px;
            text-align: center;
        }
        .login-card h2 { margin-bottom: 20px; color: #333; }
        .input-group { margin-bottom: 15px; text-align: left; }
        .input-group label { display: block; font-size: 0.9rem; color: #666; margin-bottom: 5px; }
        .input-group input { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 6px; }
        .login-btn {
            width: 100%; padding: 10px; background: #005edd; color: white;
            border: none; border-radius: 6px; font-size: 1rem; cursor: pointer; font-weight: bold;
        }
        .login-btn:hover { background: #0047a8; }
        #msg { color: #e30022; margin-top: 10px; font-size: 0.9rem; }
        #dark-btn {
            position: fixed; top: 16px; right: 16px;
            background: rgba(0,0,0,0.08); border: none; border-radius: 50%;
            width: 40px; height: 40px; font-size: 1.2rem; cursor: pointer; z-index: 100;
        }
        /* 深色模式 */
        body.dark { background-color: #16161f !important; }
        body.dark .login-card { background: #22223a !important; box-shadow: 0 4px 15px rgba(0,0,0,0.4) !important; }
        body.dark .login-card h2 { color: #e0e0ee !important; }
        body.dark .input-group label { color: #9999bb !important; }
        body.dark .input-group input { background: #2a2a3d !important; color: #e0e0ee !important; border-color: #44445a !important; }
        body.dark a { color: #9999bb !important; }
        body.dark div[style*="color: #666"] { color: #9999bb !important; }
        body.dark #dark-btn { background: rgba(255,255,255,0.1) !important; }
    </style>
</head>
<body>
    <button id="dark-btn" onclick="toggleDark()">🌙</button>
    <div class="login-card">
        <h2 id="form-title">🚊 系統登入</h2>
        <div class="input-group">
            <label>帳號 ID</label>
            <input type="text" id="userid" placeholder="輸入帳號">
        </div>
        <div class="input-group" id="username-group" style="display:none;">
            <label>顯示名稱</label>
            <input type="text" id="username" placeholder="輸入顯示名稱">
        </div>
        <div class="input-group">
            <label>密碼</label>
            <input type="password" id="password" placeholder="輸入密碼">
        </div>
        <div class="input-group" id="confirm-group" style="display:none;">
            <label>確認密碼</label>
            <input type="password" id="confirm-password" placeholder="再次輸入密碼">
        </div>
        <button class="login-btn" id="submit-btn" onclick="handleSubmit()">登入系統</button>
        <p id="msg"></p>
        <div style="margin-top: 12px; font-size: 0.85rem; color: #666;">
            <span id="toggle-text">還沒有帳號？</span>
            <a href="#" id="toggle-link" onclick="toggleMode(); return false;" style="color: #005edd; text-decoration: none; font-weight: bold;">立即註冊</a>
        </div>
        <br>
        <a href="index.html" style="font-size: 0.85rem; color: #666; text-decoration: none;">返回地圖</a>
    </div>

    <script>
        if (localStorage.getItem('metro_dark') === '1') {
            document.body.classList.add('dark');
            document.getElementById('dark-btn').textContent = '☀️';
        }
        function toggleDark() {
            const isDark = document.body.classList.toggle('dark');
            localStorage.setItem('metro_dark', isDark ? '1' : '0');
            document.getElementById('dark-btn').textContent = isDark ? '☀️' : '🌙';
        }

        const API_URL = "https://script.google.com/macros/s/AKfycbzMS3h1Cm4cFREYEkOQVKyS4VyQad4dKEvEv9DveZtFMQ1PG_6kkhi-5g0UONcOaYSv_g/exec";

        let isRegisterMode = false;

        function toggleMode() {
            isRegisterMode = !isRegisterMode;
            document.getElementById('form-title').textContent = isRegisterMode ? '🚊 創建帳號' : '🚊 系統登入';
            document.getElementById('username-group').style.display = isRegisterMode ? 'block' : 'none';
            document.getElementById('confirm-group').style.display = isRegisterMode ? 'block' : 'none';
            document.getElementById('submit-btn').textContent = isRegisterMode ? '創建帳號' : '登入系統';
            document.getElementById('toggle-text').textContent = isRegisterMode ? '已有帳號？' : '還沒有帳號？';
            document.getElementById('toggle-link').textContent = isRegisterMode ? '返回登入' : '立即註冊';
            document.getElementById('msg').textContent = '';
        }

        function handleSubmit() {
            isRegisterMode ? handleRegister() : handleLogin();
        }

        async function handleLogin() {
            const userid = document.getElementById('userid').value.trim();
            const password = document.getElementById('password').value;
            const msgObj = document.getElementById('msg');

            if (!userid || !password) {
                msgObj.style.color = "#e30022";
                msgObj.textContent = "請輸入帳號與密碼！";
                return;
            }

            msgObj.style.color = "#666";
            msgObj.textContent = "驗證中，請稍候...";
            document.getElementById('submit-btn').disabled = true;

            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    body: JSON.stringify({ action: 'login', user_id: userid, password: password })
                });
                const result = await response.json();

                if (result.success) {
                    msgObj.style.color = "green";
                    msgObj.textContent = "登入成功！跳轉中...";
                    localStorage.setItem("metro_user", JSON.stringify(result.user));
                    localStorage.setItem("metro_token", result.token);
                    setTimeout(() => { window.location.href = "index.html"; }, 1000);
                } else {
                    msgObj.style.color = "#e30022";
                    msgObj.textContent = result.message;
                }
            } catch (error) {
                msgObj.style.color = "#e30022";
                msgObj.textContent = "連線失敗，請檢查網路狀態。";
            } finally {
                document.getElementById('submit-btn').disabled = false;
            }
        }

        async function handleRegister() {
            const userid = document.getElementById('userid').value.trim();
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            const confirm = document.getElementById('confirm-password').value;
            const msgObj = document.getElementById('msg');

            if (!userid || !username || !password) {
                msgObj.style.color = "#e30022";
                msgObj.textContent = "請填寫所有欄位！";
                return;
            }
            if (password !== confirm) {
                msgObj.style.color = "#e30022";
                msgObj.textContent = "兩次密碼不一致！";
                return;
            }

            msgObj.style.color = "#666";
            msgObj.textContent = "創建中，請稍候...";
            document.getElementById('submit-btn').disabled = true;

            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    body: JSON.stringify({ action: 'register', user_id: userid, username: username, password: password })
                });
                const result = await response.json();

                if (result.success) {
                    msgObj.style.color = "green";
                    msgObj.textContent = "帳號創建成功！請登入。";
                    toggleMode();
                    document.getElementById('userid').value = userid;
                    document.getElementById('password').value = '';
                } else {
                    msgObj.style.color = "#e30022";
                    msgObj.textContent = result.message || "創建失敗，請再試一次。";
                }
            } catch (error) {
                msgObj.style.color = "#e30022";
                msgObj.textContent = "連線失敗，請檢查網路狀態。";
            } finally {
                document.getElementById('submit-btn').disabled = false;
            }
        }
    </script>
</body>
</html>
